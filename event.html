<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事件详情 — BGP Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.breadcrumb { font-size:13px; color:var(--muted); margin-bottom:24px; }
.breadcrumb a { color:var(--accent); text-decoration:none; }
.breadcrumb a:hover { text-decoration:underline; }

.hero-bar {
  background:var(--card); border-radius:12px; padding:24px 28px;
  border:1px solid var(--border); margin-bottom:24px;
}
.hero-bar h1 { font-size:22px; font-weight:700; font-family:var(--font-mono); letter-spacing:-0.5px; }
.hero-bar .meta { display:flex; flex-wrap:wrap; gap:16px; margin-top:12px; font-size:13px; color:var(--muted); font-family:var(--font-mono); }
.hero-bar .meta span { display:flex; align-items:center; gap:4px; }
.hero-bar .meta strong { color:var(--text); font-weight:600; }

.section-box {
  background:var(--card); border-radius:12px; padding:20px 24px;
  border:1px solid var(--border); margin-bottom:16px;
}
.section-box h2 { font-size:15px; font-weight:600; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.section-box h3 { font-size:13px; font-weight:600; margin:16px 0 8px; color:var(--accent); }

.topo-table { width:100%; border-collapse:collapse; font-size:13px; }
.topo-table th { text-align:left; padding:6px 10px; font-weight:600; color:var(--muted); font-size:11px; border-bottom:1px solid var(--border); }
.topo-table td { padding:6px 10px; border-bottom:1px solid var(--border); font-family:var(--font-mono); font-size:12px; }
.topo-table tr:last-child td { border-bottom:none; }
.topo-table .peer-ip { color:var(--muted); }

.timeline-list { max-height:400px; overflow-y:auto; }
.timeline-item {
  display:flex; gap:12px; padding:6px 0;
  font-family:var(--font-mono); font-size:12px;
  border-bottom:1px solid rgba(31,41,55,0.5);
}
.timeline-item:last-child { border-bottom:none; }
.timeline-ts { color:var(--muted); min-width:80px; }
.timeline-peer { color:var(--text); min-width:60px; }
.timeline-aspath { color:var(--accent); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.conclusion-text { font-size:13px; line-height:1.8; color:var(--text); }
.conclusion-text strong { color:var(--accent); }

.group-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
.group-table th { text-align:left; padding:6px 10px; font-weight:600; color:var(--muted); font-size:11px; border-bottom:1px solid var(--border); }
.group-table td { padding:6px 10px; border-bottom:1px solid var(--border); }
.group-table tr:last-child td { border-bottom:none; }

@media(max-width:600px) {
  .hero-bar .meta { flex-direction:column; gap:8px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <a href="./" style="text-decoration:none;display:flex;align-items:center;gap:10px;color:inherit;">
        <span class="nav-logo">◉</span>
        <span class="nav-title">BGP Monitor</span>
      </a>
    </div>
    <div class="nav-meta">
      <span class="nav-period">事件详情</span>
      <span class="nav-dot">·</span>
      <a href="raw.html" style="color:var(--accent);text-decoration:none;font-size:13px;">原始数据</a>
    </div>
  </div>
</nav>

<main class="main" id="app">
  <div class="breadcrumb"><a href="./">← 返回仪表盘</a> / <span id="bcPrefix">—</span></div>
  
  <div class="hero-bar" id="heroBar">
    <h1 id="eventPrefix">—</h1>
    <div class="meta">
      <span>类型 <strong id="eventTypeBadge">—</strong></span>
      <span>开始 <strong id="eventStart">—</strong></span>
      <span>结束 <strong id="eventEnd">—</strong></span>
      <span>持续 <strong id="eventDuration">—</strong></span>
      <span>对等体 <strong id="eventPeers">—</strong></span>
    </div>
  </div>

  <div class="section-box" id="topoSection">
    <h2>一、拓扑结构</h2>
    <div id="topoContent"></div>
  </div>

  <div class="section-box" id="timelineSection">
    <h2>二、事件时间线</h2>
    <div id="timelineContent"></div>
  </div>

  <div class="section-box" id="conclusionSection">
    <h2>三、结论</h2>
    <div class="conclusion-text" id="conclusionContent"></div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span>Data from RouteViews route-views2</span>
    <span id="updateTime">—</span>
  </div>
</footer>

<script>
const COLORS = {A:'#00D4AA', B:'#FF6B6B', C:'#FBBF24', D:'#A78BFA', P:'#60A5FA'};
const TYPE_NAMES = {A:'单对等体撤回', B:'全网不可达', C:'路由振荡', D:'永久消失', P:'部分断开'};

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toISOString().slice(5,16).replace('T',' ');
}
function fmtTimeFull(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toISOString().slice(0,19).replace('T',' ');
}
function fmtDur(sec) {
  if (!sec) return '—';
  if (sec > 86400) return (sec/86400).toFixed(1)+' 天';
  if (sec > 3600) return (sec/3600).toFixed(1)+' 小时';
  if (sec > 60) return (sec/60).toFixed(0)+' 分钟';
  return sec.toFixed(0)+' 秒';
}

async function loadEvent() {
  const params = new URLSearchParams(location.search);
  const eid = params.get('id');
  const prefix = params.get('prefix');
  const vps = params.get('vps');
  
  if (!eid && !prefix) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px;color:#6B7280;">未指定事件 ID 或前缀</div>';
    return;
  }
  
  let eventData = null;
  
  if (eid) {
    // 尝试加载带 VPS 前缀的文件
    const tryLoadWithVps = async (v) => {
      try {
        if (v === null || v === undefined) return null;
        const r = await fetch(`data/events/event_${v}_${eid}.json`);
        if (r.ok) return await r.json();
      } catch(e) {}
      return null;
    };
    
    // 尝试多个可能的 VPS
    const vpsCandidates = [vps];
    for (let i = 0; i <= 4; i++) vpsCandidates.push(i);
    for (const v of vpsCandidates) {
      if (v === null || v === undefined) continue;
      eventData = await tryLoadWithVps(v);
      if (eventData) break;
    }
    // Fallback 1: events_summary
    if (!eventData) {
      try {
        const s = await fetch('data/events_summary.json');
        if (s.ok) {
          const summary = await s.json();
          const found = (summary.events || []).find(e => e.id == eid);
          if (found) {
            eventData = found;
            eventData.start_time = found.start;
            eventData.end_time = found.end;
            eventData.event_type = found.type;
            // 如果有 vps 信息，尝试精确加载
            if (found.vps !== undefined) {
              const r2 = await fetch(`data/events/event_${found.vps}_${eid}.json`);
              if (r2.ok) eventData = await r2.json();
            }
          }
        }
      } catch(e) {}
    }
    
    // Fallback 2: prefix json
    if (!eventData && prefix) {
      const pf = prefix.replace('/','_');
      try {
        const r = await fetch(`data/prefixes/${pf}.json`);
        if (r.ok) {
          const data = await r.json();
          if (data.events && data.events[0]) {
            eventData = data.events[0];
            eventData.prefix = prefix;
            // Normalize prefix JSON format to event format
            if (eventData.time && !eventData.start_time) {
              const parts = eventData.time.split('→');
              if (parts[0]) eventData.start_time = parts[0].trim();
              if (parts[1]) eventData.end_time = parts[1].trim();
            }
          }
        }
      } catch(e) {}
    }
  } else if (prefix) {
    // Load from prefix JSON
    const pf = prefix.replace('/','_');
    try {
      const r = await fetch(`data/prefixes/${pf}.json`);
      if (r.ok) {
        const data = await r.json();
        if (data.events && data.events[0]) {
          eventData = data.events[0];
          eventData.prefix = prefix;
        }
      }
    } catch(e) {}
  }
  
  if (!eventData) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px;color:#6B7280;">事件数据未找到</div>';
    return;
  }
  
  renderEvent(eventData);
  window._vps = vps;
}

function renderEvent(ev) {
  // Normalize field names from different sources
  const prefix = ev.prefix || '—';
  const type = ev.event_type || ev.type || '?';
  let startStr = ev.start_time || ev.start;
  let endStr = ev.end_time || ev.end;
  
  // Handle prefix JSON format (time strings like "01-01 00:00")
  if (typeof startStr === 'string' && startStr.length < 20) {
    const year = '2026-';
    startStr = year + startStr;
    if (startStr.length < 16) startStr += ':00';
  }
  if (typeof endStr === 'string' && endStr.length < 20) {
    const year = '2026-';
    endStr = year + endStr;
    if (endStr.length < 16) endStr += ':00';
  }
  
  const startDate = typeof startStr === 'number' ? new Date(startStr * 1000) : new Date(startStr);
  const endDate = typeof endStr === 'number' ? new Date(endStr * 1000) : endStr ? new Date(endStr) : null;
  const startDisplay = startDate && !isNaN(startDate) ? startDate.toISOString().slice(0,19).replace('T',' ') : (ev.start_time || ev.start || '—');
  const endDisplay = endDate && !isNaN(endDate) ? endDate.toISOString().slice(0,19).replace('T',' ') : (endStr ? '活跃中' : '—');
  
  const durSec = ev.duration_sec || (typeof startStr === 'number' && typeof endStr === 'number' ? endStr - startStr : 0);
  const durDisplay = fmtDur(durSec);
  
  // Set basic info
  document.getElementById('bcPrefix').textContent = prefix;
  document.getElementById('eventPrefix').textContent = prefix;
  document.getElementById('eventStart').textContent = startDisplay;
  document.getElementById('eventEnd').textContent = endDisplay;
  document.getElementById('eventDuration').textContent = durDisplay;
  document.getElementById('eventPeers').textContent = ev.total_peers || ev.peers || (ev.withdrawn || '?');
  
  // Add raw data link
  const heroBar = document.getElementById('heroBar');
  let rawLink = heroBar.querySelector('.raw-link');
  if (!rawLink) {
    rawLink = document.createElement('a');
    rawLink.className = 'raw-link';
    rawLink.style.cssText = 'display:inline-block;margin-top:10px;font-size:12px;color:var(--accent);text-decoration:none;';
    rawLink.innerHTML = '📄 查看原始数据 →';
    heroBar.querySelector('.meta').after(rawLink);
  }
  rawLink.href = `raw.html?prefix=${encodeURIComponent(prefix)}&vps=${window._vps || ''}`;
  
  const badge = document.getElementById('eventTypeBadge');
  badge.textContent = `${type} ${TYPE_NAMES[type] || ''}`;
  badge.style.color = COLORS[type] || '#fff';
  
  // Topology - SVG Graph
  const topo = ev.topology || [];
  let topoHtml = '';
  if (topo.length > 0) {
    // Build graph from paths
    const nodes = {};
    const edges = [];
    const depthMap = {};
    
    topo.forEach(p => {
      const path = (p.as_path || p.path || '').trim().split(/\s+/);
      if (path.length < 2) return;
      
      path.forEach((asn, i) => {
        if (!nodes[asn]) {
          nodes[asn] = { id: asn, depth: i, count: 0 };
          depthMap[i] = (depthMap[i] || 0) + 1;
        }
        nodes[asn].depth = Math.min(nodes[asn].depth, i);
        nodes[asn].count++;
        if (i > 0) edges.push({ from: path[i-1], to: asn });
      });
    });
    
    // Group unique edges, count multiplicity
    const edgeMap = {};
    edges.forEach(e => {
      const key = `${e.from}→${e.to}`;
      edgeMap[key] = (edgeMap[key] || 0) + 1;
    });
    
    // Sort nodes by depth
    const sorted = Object.values(nodes).sort((a,b) => a.depth - b.depth || parseInt(b.id) - parseInt(a.id));
    const origin = sorted[sorted.length-1];
    
    // Group nodes by depth
    const byDepth = {};
    sorted.forEach(n => {
      if (!byDepth[n.depth]) byDepth[n.depth] = [];
      byDepth[n.depth].push(n);
    });
    
    const maxDepth = Math.max(...Object.keys(byDepth).map(Number));
    const nodeW = 110, nodeH = 32, gapX = 32, gapY = 20, padTop = 24;
    
    // Calculate column widths per depth
    const colWidths = {};
    Object.keys(byDepth).forEach(d => {
      const len = byDepth[d].length;
      colWidths[d] = Math.max(len, 1);
    });
    const maxCol = Math.max(...Object.values(colWidths));
    
    const svgW = (maxDepth + 1) * (nodeW + gapX) + 40;
    const svgH = maxCol * (nodeH + gapY) + 60;
    
    // Position nodes
    const positions = {};
    Object.keys(byDepth).forEach(d => {
      const items = byDepth[d];
      const totalH = items.length * (nodeH + gapY);
      const startY = (svgH - totalH) / 2 + 8;
      const x = 20 + parseInt(d) * (nodeW + gapX);
      items.forEach((n, i) => {
        positions[n.id] = { x, y: startY + i * (nodeH + gapY) };
      });
    });
    
    // Build SVG
    let svg = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="width:100%;max-width:${svgW}px;height:auto;">`;
    
    // Background
    svg += `<rect width="${svgW}" height="${svgH}" fill="none"/>`;
    
    // Edges (behind nodes)
    Object.entries(edgeMap).forEach(([key, cnt]) => {
      const [from, to] = key.split('→');
      const p1 = positions[from], p2 = positions[to];
      if (!p1 || !p2) return;
      const opacity = Math.min(0.2 + cnt * 0.03, 0.7);
      svg += `<line x1="${p1.x + nodeW}" y1="${p1.y + nodeH/2}" 
        x2="${p2.x}" y2="${p2.y + nodeH/2}" 
        stroke="#00D4AA" stroke-width="${Math.min(cnt, 3) + 0.5}" 
        stroke-opacity="${opacity}" stroke-linecap="round"/>`;
    });
    
    // Nodes
    sorted.forEach(n => {
      const pos = positions[n.id];
      if (!pos) return;
      const isOrigin = n.id === origin.id;
      const isPeer = n.depth === 0;
      const fill = isOrigin ? '#FF6B6B' : isPeer ? '#131A2B' : '#1F2937';
      const border = isOrigin ? '#FF6B6B' : isPeer ? '#00D4AA' : '#374151';
      
      svg += `<g>
        <rect x="${pos.x}" y="${pos.y}" width="${nodeW}" height="${nodeH}" 
          rx="6" ry="6" fill="${fill}" stroke="${border}" stroke-width="1.5"/>
        <text x="${pos.x + nodeW/2}" y="${pos.y + nodeH/2 + 5}" 
          text-anchor="middle" font-family="JetBrains Mono" font-size="12" 
          font-weight="${isOrigin ? 700 : 500}" fill="#E5E7EB">
          ${isOrigin ? '🏁 ' : ''}AS${n.id}
        </text>
      </g>`;
    });
    
    // Depth labels at top
    Object.keys(byDepth).forEach(d => {
      const first = byDepth[d][0];
      const pos = positions[first.id];
      if (!pos) return;
      const label = d === '0' ? '对等体' : d === String(maxDepth) ? '起源 AS' : `跳 ${d}`;
      svg += `<text x="${pos.x + nodeW/2}" y="${padTop - 8}" 
        text-anchor="middle" font-family="Inter" font-size="11" fill="#6B7280">${label}</text>`;
    });
    
    svg += '</svg>';
    
    topoHtml = `<p style="font-size:13px;color:var(--muted);margin-bottom:12px;">${topo.length} 条路径，${Object.keys(nodes).length} 个 AS 节点</p>`;
    topoHtml += `<div style="overflow-x:auto;padding:4px 0;">${svg}</div>`;
  } else {
    topoHtml = '<div style="color:var(--muted);font-size:13px;">无路径数据</div>';
  }
  document.getElementById('topoContent').innerHTML = topoHtml;
  
  // Timeline
  const wls = ev.w_timeline || [];
  const als = ev.a_timeline || [];
  const updates = ev.updates || [];
  let tlHtml = '';
  
  if (updates.length > 0) {
    tlHtml += `<div style="display:flex;gap:12px;margin-bottom:8px;font-size:12px;color:var(--muted);">
      <span>撤回收敛: <strong style="color:var(--warning);">${updates.filter(u=>u.type==='W').length} 次</strong></span>
      <span>恢复宣告: <strong style="color:var(--accent);">${updates.filter(u=>u.type==='A').length} 次</strong></span>
      <span>涉及对等体: <strong>${new Set(updates.map(u=>u.peer_as)).size}</strong></span>
    </div>`;
    tlHtml += `<div class="timeline-list">`;
    updates.slice(0,40).forEach(u => {
      const ts = fmtTime(u.ts || u.timestamp);
      const typeMark = u.type === 'W' ? '❌' : '✅';
      const color = u.type === 'W' ? 'var(--warning)' : 'var(--accent)';
      const path = u.as_path || u.path || '';
      tlHtml += `<div class="timeline-item">
        <span class="timeline-ts">${ts}</span>
        <span class="timeline-peer" style="color:${color}">${typeMark} AS${u.peer_as}</span>
        <span class="timeline-aspath">${path ? path : ''}</span>
      </div>`;
    });
    if (updates.length > 40) tlHtml += `<div style="padding:8px 0;font-size:11px;color:var(--muted);text-align:center;">...还有 ${updates.length-40} 条</div>`;
    tlHtml += `</div>`;
    
    // First/last analysis
    const wFirst = updates.find(u => u.type === 'W');
    const wLast = [...updates].reverse().find(u => u.type === 'W');
    const aFirst = updates.find(u => u.type === 'A');
    const aLast = [...updates].reverse().find(u => u.type === 'A');
    if (wFirst && wLast) {
      const spread = wLast.ts - wFirst.ts;
      tlHtml += `<div style="margin-top:12px;font-size:12px;color:var(--muted);">
        撤回收敛耗时: <strong style="color:var(--text);">${fmtDur(spread)}</strong>
      </div>`;
    }
    if (aFirst && aLast) {
      const spread = aLast.ts - aFirst.ts;
      tlHtml += `<div style="font-size:12px;color:var(--muted);">
        恢复传播耗时: <strong style="color:var(--text);">${fmtDur(spread)}</strong>
      </div>`;
    }
  } else if (wls.length > 0 || als.length > 0) {
    tlHtml += `<div style="display:flex;gap:12px;margin-bottom:8px;font-size:12px;color:var(--muted);">
      <span>撤回: <strong style="color:var(--warning);">${wls.length} 次</strong></span>
      <span>宣告: <strong style="color:var(--accent);">${als.length} 次</strong></span>
    </div>`;
    tlHtml += `<div class="timeline-list">`;
    const allEv = [...wls.map(w=>({...w,type:'W'})), ...als.map(a=>({...a,type:'A'}))].sort((a,b)=>a.ts-b.ts);
    allEv.slice(0,40).forEach(u => {
      const ts = fmtTime(u.ts);
      const color = u.type === 'W' ? 'var(--warning)' : 'var(--accent)';
      const path = u.path || '';
      tlHtml += `<div class="timeline-item">
        <span class="timeline-ts">${ts}</span>
        <span class="timeline-peer" style="color:${color}">${u.type==='W' ? '❌' : '✅'} AS${u.peer}</span>
        <span class="timeline-aspath">${path || ''}</span>
      </div>`;
    });
    if (allEv.length > 40) tlHtml += `<div style="padding:8px 0;font-size:11px;color:var(--muted);text-align:center;">...还有 ${allEv.length-40} 条</div>`;
    tlHtml += `</div>`;
  } else {
    tlHtml = '<div style="color:var(--muted);font-size:13px;">无时间线数据</div>';
  }
  document.getElementById('timelineContent').innerHTML = tlHtml;
  
  // Conclusion
  const reason = ev.close_reason || ev.reason || '';
  const dur = ev.duration_sec || (typeof startStr === 'number' && typeof endStr === 'number' ? endStr - startStr : 0);
  const typeName = TYPE_NAMES[ev.event_type||ev.type] || '';
  const wPeers = ev.w_peers ? ev.w_peers.length : (ev.withdrawn || 0);
  const aPeers = ev.a_peers ? ev.a_peers.length : 0;
  
  let conclusion = `<p><strong>事件摘要</strong></p>`;
  conclusion += `<p>该前缀在 ${startDisplay} 至 ${endDisplay} 期间发生了一起 <strong>${typeName}</strong> 事件。</p>`;
  conclusion += `<p>${reason}</p>`;
  conclusion += `<p>持续 ${durDisplay}，涉及 ${wPeers} 个对等体撤回，${aPeers} 个恢复。</p>`;
  
  if (ev.topology && ev.topology.length > 0) {
    const firstPath = ev.topology[0].as_path || ev.topology[0].path || '';
    const parts = firstPath.split(' ');
    if (parts.length >= 2) {
      const origin = parts[parts.length-1];
      conclusion += `<p style="margin-top:12px;"><strong>路径分析</strong></p>`;
      conclusion += `<p>所有路径均经过 AS${origin}，故障源很可能位于该 AS 或其上游。</p>`;
    }
  }
  
  document.getElementById('conclusionContent').innerHTML = conclusion;
}

document.addEventListener('DOMContentLoaded', loadEvent);
</script>
</body>
</html>
